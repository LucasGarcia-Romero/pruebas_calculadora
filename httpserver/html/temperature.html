<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bird Recorder — Temperatura</title>
<style>
:root {
  --card: rgba(0,0,0,0.45);
  --card-border: rgba(255,255,255,0.15);
  --text: #e8f5e9;
  --muted: #b7d6b8;
  --accent: #4CAF50;
  --accent-dark: #2e7d32;
  --shadow: 0 20px 50px rgba(0,0,0,0.5);
}
 
* { box-sizing: border-box; }
 
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: var(--text);
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("fondo.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  min-height: 100vh;
}
 
.wrapper {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}
 
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}
 
.brand { display: flex; align-items: center; gap: 15px; }
 
.brand-badge {
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 14px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.2);
}
 
.brand-badge img { width: 32px; height: 32px; object-fit: contain; }
.brand h1 { margin: 0; font-size: 24px; }
.brand p  { margin: 3px 0 0; color: var(--muted); font-size: 14px; }
 
.back-btn {
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07);
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s;
}
.back-btn:hover { background: rgba(255,255,255,0.13); }
 
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 28px;
  margin-bottom: 24px;
}
 
.temp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
 
.temp-header h2 { margin: 0; font-size: 20px; }
 
.temp-big {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
 
.temp-value {
  font-size: 56px;
  font-weight: bold;
  line-height: 1;
  transition: color 0.5s;
}
 
.temp-unit {
  font-size: 24px;
  color: var(--muted);
}
 
.temp-status {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
}
 
.refresh-hint {
  font-size: 12px;
  color: var(--muted);
  opacity: 0.6;
}
 
.chart-container {
  position: relative;
  height: 220px;
  margin-top: 8px;
}
 
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
 
.stat {
  padding: 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  text-align: center;
}
 
.stat .label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}
 
.stat .value {
  font-size: 26px;
  font-weight: bold;
}
 
@media(max-width:600px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .temp-value { font-size: 42px; }
}
</style>
</head>
<body>
 
<div class="wrapper">
 
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">
        <img src="favicon.ico" alt="logo">
      </div>
      <div>
        <h1>Temperatura</h1>
        <p>Monitor de CPU — Orange Pi</p>
      </div>
    </div>
    <a class="back-btn" href="/index.html">← Volver</a>
  </header>
 
  <div class="card">
    <div class="temp-header">
      <div>
        <h2>CPU Board</h2>
        <div class="temp-status" id="temp-status">Leyendo…</div>
      </div>
      <div style="text-align:right">
        <div class="temp-big">
          <span class="temp-value" id="temp-value">--</span>
          <span class="temp-unit">°C</span>
        </div>
        <div class="refresh-hint" id="last-update">actualizando…</div>
      </div>
    </div>
 
    <div class="chart-container">
      <canvas id="tempChart"></canvas>
    </div>
  </div>
 
  <div class="stats-grid">
    <div class="stat">
      <div class="label">Mínima</div>
      <div class="value" id="stat-min">--°</div>
    </div>
    <div class="stat">
      <div class="label">Máxima</div>
      <div class="value" id="stat-max">--°</div>
    </div>
    <div class="stat">
      <div class="label">Media</div>
      <div class="value" id="stat-avg">--°</div>
    </div>
  </div>
 
</div>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// Comprobar sesión
(function() {
  var hasCookie = document.cookie.split(';').some(function(c) {
    return c.trim().startsWith('birdsession=');
  });
  if (!hasCookie) window.location.href = '/login.html';
})();
 
const MAX_POINTS = 40;
const labels = [];
const tempData = [];
 
const ctx = document.getElementById('tempChart').getContext('2d');
 
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'CPU °C',
      data: tempData,
      borderColor: '#4CAF50',
      backgroundColor: 'rgba(76,175,80,0.1)',
      borderWidth: 2,
      pointRadius: 2,
      pointHoverRadius: 5,
      tension: 0.3,
      fill: true
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 400 },
    scales: {
      x: {
        ticks: { color: '#b7d6b8', font: { size: 11 }, maxTicksLimit: 8 },
        grid:  { color: 'rgba(255,255,255,0.06)' }
      },
      y: {
        min: 20,
        max: 90,
        ticks: {
          color: '#b7d6b8',
          font: { size: 11 },
          callback: v => v + '°C'
        },
        grid: { color: 'rgba(255,255,255,0.06)' }
      }
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.parsed.y + ' °C'
        }
      }
    }
  }
});
 
function getTempColor(t) {
  if (t < 50) return '#4CAF50';
  if (t < 65) return '#ff9800';
  return '#f44336';
}
 
function getTempLabel(t) {
  if (t < 50) return 'Temperatura normal';
  if (t < 65) return 'Temperatura elevada';
  return 'Temperatura crítica';
}
 
function updateStats() {
  if (tempData.length === 0) return;
  const min = Math.min(...tempData);
  const max = Math.max(...tempData);
  const avg = Math.round(tempData.reduce((a,b) => a+b, 0) / tempData.length);
  document.getElementById('stat-min').textContent = min + '°';
  document.getElementById('stat-max').textContent = max + '°';
  document.getElementById('stat-avg').textContent = avg + '°';
 
  // Ajusta el rango Y dinámicamente
  chart.options.scales.y.min = Math.max(0,  min - 5);
  chart.options.scales.y.max = Math.min(100, max + 5);
}
 
function fetchTemp() {
  fetch('/temperature')
    .then(r => r.json())
    .then(function(data) {
      const t = data.cpu_temp;
      const now = new Date();
      const timeStr = now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
 
      // Actualiza valor grande
      const valEl = document.getElementById('temp-value');
      valEl.textContent = t;
      valEl.style.color = getTempColor(t);
 
      document.getElementById('temp-status').textContent = getTempLabel(t);
      document.getElementById('last-update').textContent = 'actualizado ' + timeStr;
 
      // Añade punto a la gráfica
      labels.push(timeStr);
      tempData.push(t);
      if (labels.length > MAX_POINTS) {
        labels.shift();
        tempData.shift();
      }
 
      // Cambia color de la línea según temperatura
      chart.data.datasets[0].borderColor = getTempColor(t);
      chart.data.datasets[0].backgroundColor = getTempColor(t).replace(')', ',0.1)').replace('rgb', 'rgba');
 
      chart.update();
      updateStats();
    })
    .catch(function() {
      document.getElementById('temp-status').textContent = 'Error de conexión';
    });
}
 
fetchTemp();
setInterval(fetchTemp, 5000);
</script>
 
</body>
</html>
